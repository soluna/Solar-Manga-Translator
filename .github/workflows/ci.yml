name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
      - name: Install backend test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt pillow numpy opencv-python httpx tqdm shapely
      - name: Compile backend
        run: |
          python -m py_compile \
            backend/main.py \
            backend/http_requests.py \
            backend/dependency_state.py \
            backend/diagnostics_bundle.py \
            backend/model_manager.py \
            backend/pip_install.py \
            backend/runtime_paths.py \
            backend/system_fonts.py \
            backend/task_manager.py \
            backend/workflow_events.py \
            backend/utils/file_handler.py \
            backend/engine/translator.py \
            backend/patched_custom_openai.py \
            backend/patched_model_download.py \
            backend/patch_pydensecrf.py \
            backend/install_deps.py
      - name: Run backend tests
        run: |
          python -m unittest discover -s backend/tests -t . -v

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            desktop/package-lock.json
      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run test:config-persistence
          npm run test:task-event-state
          npm run test:task-connection
          npm run test:workflow-state
          npm run build
      - name: Check desktop scripts
        run: |
          cd desktop
          npm ci
          node --check main.mjs
          node --check preload.mjs
          node --check runtime-paths.mjs
          node --check scripts/dev.mjs
          node --check scripts/test-runtime-paths.mjs
          node --check scripts/stage-runtime.mjs
          node --check scripts/package-win.mjs
          npm run test:runtime-paths
      - name: Check for forbidden tracked content
        run: |
          if git ls-files | grep -Ei '(^|/)(models?|output_images|temp_uploads|temp_extracted|resources-staging|node_modules)(/|$)'; then
            echo "Forbidden generated or binary-content directory is tracked."
            exit 1
          fi
          disallowed_fonts="$(git ls-files | grep -Ei '\.(otf|ttf|ttc|woff2?|eot)$' | grep -Ev '^fonts/system/SourceHanSansSC-(Regular-2|Medium-2|Bold)\.otf$' || true)"
          if [ -n "$disallowed_fonts" ]; then
            echo "$disallowed_fonts"
            echo "Only allowlisted open-source bundled fonts may be tracked."
            exit 1
          fi
          disallowed_custom_fonts="$(git ls-files fonts/custom | grep -Ev '^fonts/custom/\.gitkeep$' || true)"
          if [ -n "$disallowed_custom_fonts" ]; then
            echo "$disallowed_custom_fonts"
            echo "User-provided fonts under fonts/custom must not be tracked."
            exit 1
          fi
          if git ls-files frontend/public | grep -Ei '(^|/)(dev-|test-|.*smoke)'; then
            echo "Development or smoke-test fixture is tracked in frontend/public."
            exit 1
          fi
          if git grep -n -E '(/Users/|/Volumes/|C:\\Users\\|iCloud~md~obsidian|ClaudeDev|Mobile Documents|Mobile%20Documents|Documents/SOL)' -- . \
            ':(exclude).github/workflows/ci.yml' \
            ':(exclude)backend/diagnostics_bundle.py' \
            ':(exclude)backend/tests/test_diagnostics_bundle.py'; then
            echo "Personal/local path found in tracked files."
            exit 1
          fi

  workflow-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install workflow test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt
          cd frontend
          npm ci
          npx playwright install --with-deps chromium
      - name: Run new-user workspace workflow
        working-directory: frontend
        run: npm run test:v2-workspace
