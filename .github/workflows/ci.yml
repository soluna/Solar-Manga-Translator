name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install backend test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt pillow numpy opencv-python httpx tqdm shapely
      - name: Compile backend
        run: |
          python -m py_compile \
            backend/main.py \
            backend/http_requests.py \
            backend/runtime_paths.py \
            backend/system_fonts.py \
            backend/utils/file_handler.py \
            backend/engine/translator.py \
            backend/patched_custom_openai.py \
            backend/install_deps.py
      - name: Run focused backend tests
        run: |
          python -m unittest \
            backend.tests.test_file_handler \
            backend.tests.test_http_requests \
            backend.tests.test_api_security \
            backend.tests.test_runtime_paths \
            backend.tests.test_system_fonts \
            backend.tests.test_translator_engine_state \
            -v

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            desktop/package-lock.json
      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build
      - name: Check desktop scripts
        run: |
          cd desktop
          npm ci
          node --check main.mjs
          node --check preload.mjs
          node --check scripts/dev.mjs
          node --check scripts/stage-runtime.mjs
          node --check scripts/package-win.mjs
      - name: Check for forbidden tracked content
        run: |
          if git ls-files | grep -Ei '(^|/)(models?|output_images|temp_uploads|temp_extracted|resources-staging|node_modules)(/|$)'; then
            echo "Forbidden generated or binary-content directory is tracked."
            exit 1
          fi
          disallowed_fonts="$(git ls-files | grep -Ei '\.(otf|ttf|ttc|woff2?|eot)$' | grep -Ev '^fonts/system/SourceHanSansSC-(Regular-2|Medium-2|Bold)\.otf$' || true)"
          if [ -n "$disallowed_fonts" ]; then
            echo "$disallowed_fonts"
            echo "Only allowlisted open-source bundled fonts may be tracked."
            exit 1
          fi
          disallowed_custom_fonts="$(git ls-files fonts/custom | grep -Ev '^fonts/custom/\.gitkeep$' || true)"
          if [ -n "$disallowed_custom_fonts" ]; then
            echo "$disallowed_custom_fonts"
            echo "User-provided fonts under fonts/custom must not be tracked."
            exit 1
          fi
          if git grep -n -E '(/Users/|/Volumes/|C:\\Users\\|iCloud~md~obsidian|ClaudeDev|Mobile Documents|Mobile%20Documents|Documents/SOL)' -- . ':(exclude).github/workflows/ci.yml'; then
            echo "Personal/local path found in tracked files."
            exit 1
          fi
